<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Domain Registry</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f3f4f6;
        color: #1f2937;
      }

      .boot-message {
        max-width: 760px;
        margin: 48px auto;
        padding: 24px;
        border: 1px solid #d1d5db;
        border-radius: 12px;
        background: #ffffff;
      }

      .boot-message h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }

      .boot-message p {
        margin: 0 0 10px;
        line-height: 1.5;
      }

      .boot-message code {
        background: #f3f4f6;
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
    <script type="module" src="/src/main.jsx"></script>
  </head>
  <body>
    <div id="root">
      <div class="boot-message">
        <h1>База доменів</h1>
        <p>Цей React-застосунок не потрібно відкривати напряму через <code>file:///...</code>.</p>
        <p>Запусти клієнт командою <code>npm run dev:client</code>, а сервер окремо командою <code>npm run dev:server</code>.</p>
        <p>Після цього відкрий у браузері адресу <code>http://localhost:5173</code>.</p>
      </div>
    </div>
  </body>
  </html>
